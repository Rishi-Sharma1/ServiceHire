version: '3.9'

services:
  client:
    build:
      context: .
      dockerfile: docker/client.Dockerfile

    ports:
      - '5173:5173'

    volumes:
      - ./client:/app
      - /app/node_modules

    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api

    depends_on:
      - server

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile

    ports:
      - '5000:5000'

    volumes:
      - ./server:/app
      - /app/node_modules

    env_file:
      - ./server/.env

    restart: always